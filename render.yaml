services:
  - type: web
    name: library-demo
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python manage.py migrate --noinput && python manage.py seed_demo && gunicorn library_project.wsgi
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: library-demo-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"

databases:
  - name: library-demo-db
    plan: free
    databaseName: library_demo
    user: library_demo
    ipAllowList: []
