{% extends "base.html" %}

{% block title %}Register loan - Library{% endblock %}

{% block content %}
  <section class="page-heading">
    <div>
      <p class="eyebrow">Librarian</p>
      <h1>Register a loan</h1>
    </div>
  </section>

  <form class="panel form-stack narrow" method="post">
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="form-errors">{{ form.non_field_errors }}</div>
    {% endif %}
    {% for field in form %}
      <label>
        {{ field.label }}
        {{ field }}
        {% if field.errors %}<span class="field-error">{{ field.errors|striptags }}</span>{% endif %}
      </label>
    {% endfor %}
    <div class="form-actions">
      <button class="button primary" type="submit">Register loan</button>
      <a class="button secondary" href="{% url 'librarian_dashboard' %}">Cancel</a>
    </div>
  </form>
{% endblock %}
